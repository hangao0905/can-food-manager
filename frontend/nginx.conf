server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /brands/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /flavors/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /can-foods/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }
}
